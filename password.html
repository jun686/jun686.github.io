<!DOCTYPE html>
<html>
<head>
  <title>二维码生成</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
    }

    .container {
      display: flex;
      align-items: center;
      background-color: #f0f0f0;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    input[type="text"] {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px;
      margin-right: 10px;
    }

    button {
      background-color: #4CAF50;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }

    #result {
      margin-top: 20px;
      text-align: center;
    }

    #result span {
      display: block; /* 将每个 span 元素设置为块级元素，使其独占一行 */
    }
  </style>
</head>
<body>
  <div class="container">
    <input type="text" id="linkInput" placeholder="输入链接">
    <button id="submitBtn">生成二维码</button>
    <div id="result"></div>
  </div>

  <script>
    const linkInput = document.getElementById("linkInput");
    const submitBtn = document.getElementById("submitBtn");
    const result = document.getElementById("result");

    submitBtn.addEventListener("click", () => {
      const link = linkInput.value;
      const formData = new FormData();
      formData.append("qrcode_route", link);
      formData.append("password", "");
      formData.append("render_default_fields", 0);
      formData.append("render_component_number", 0);
      formData.append("render_edit_btn", 1);

      fetch("https://nc.cli.im/qrcoderoute/qrcodeRouteNew", {
        method: "POST",
        body: formData
      })
      .then(response => response.json())
      .then(data => {
        result.innerHTML = ''; // 清除之前的结果
        for (const key in data) {
          const span = document.createElement('span');
          span.textContent = `${key}: ${data[key]}`;
          result.appendChild(span);
        }
      })
      .catch(error => {
        console.error("Error:", error);
        result.textContent = "请求失败";
      });
    });
  </script>
</body>
</html>
